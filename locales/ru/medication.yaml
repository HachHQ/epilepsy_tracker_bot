medication:
  name_prompt: |
    Напишите название препарата. Это может как торговое так и рыночное наименование, как вам удобно.

    Длина названия препарата не может быть выше 40 символов.
  name_too_long: "Длина названия препарата не может быть больше 40 символов."
  name_updated: "Название лекарства обновлено: {value}"
  dosage_prompt: |
    Введите принимаемую дозировку (Например: 150мг или 50г):

    {hint}
  dosage_too_long: "Длина дозировки препарата не может быть больше 40 символов."
  dosage_updated: "Дозировка лекарства обновлена: {value}"
  frequency_prompt: |
    Введите частоту приема лекарства дозировку (Например: 2 раза в день или раз в день):

    {hint}
  frequency_too_long: "Длина строки описывающей частоту приема препарата не может быть больше 60 символов."
  frequency_updated: "Частота приема для курса лекарства обновлена: {value}"
  notes_prompt: |
    Введите заметку о лекарстве, в вольном формате (Может врач дал вам какие-то рекомендации к приему, которые стоит зафиксировать):
    Вы можете пропустить этот шаг нажав на '⏩ Пропустить шаг'.

    {hint}
  notes_edit_prompt: |
    Введите заметку о лекарстве, в вольном формате:
    {hint}
  notes_too_long: "Длина строки описывающей заметку к приему препарата не может быть больше 60 символов."
  notes_updated: "Заметка для курса лекарства обновлена: {value}"
  start_date_prompt: |
    Введите дату начала приема лекарства в формате - 2000-02-30 (год, день, месяц). Это нужно для отслеживания его эффективности:

  start_date_invalid: "Дата должна быть в формате - 2000-02-30 (год, день, месяц)"
  start_date_updated: "Дата начала курса лекарства обновлена: {value}"
  end_date_create_prompt: |
    Если вы все еще принимаете препарат, для которого заполняете анкету, то нажмите на - '⌛ Еще принимаю'

    Если же вы вводите данные о препарате курс которого окончен, то введите дату в таком же формате как и в предыдущем шаге.
    Сохранение в системе препаратов курс приема которых окончен также помогает наглядно учесть его эффективность, если в системе есть данные о приступах, зафиксированных во время его приема.

    {hint}
  end_date_prompt: |
    Введите дату окончания приема лекарства в формате - 2000-02-30 (год, день, месяц). Это нужно для отслеживания его эффективности:

  end_date_updated: "Дата окончания курса лекарства обновлена: {value}"
  course_added: |
    Курс лекарства добавлен

    Название лекарства: {medication_name}
    Дозировка: {dosage}
    Частота приема: {frequency}
    Заметка: {notes}
    Начало приема курса: {start_date}
    Конец приема курса: {end_date}
  not_entered: "Не введено"
  no_courses: "У вас нет добавленных курсов лекарств."
  courses_list_header: "Ваши курсы лекарств (Всего {count})\n\n"
  course_settings: |
    Настройки курса для профиля - {profile_name}

    💊 Название лекарства: {medication_name} - /mdc_medname_{mdc_id}
    ⏲️ Дозировка: {dosage} - /mdc_dos_{mdc_id}
    🔰 Частота приема: {frequency} - /mdc_freq_{mdc_id}
    🗒️ Заметка: {notes} - /mdc_note_{mdc_id}
    ⏱️ Начало приема курса: {start_date} - /mdc_strdt_{mdc_id}
    ⏱️ Конец приема курса: {end_date} - /mdc_enddt_{mdc_id}
    🗑️ Удалить запись о курсе: - /mdc_del_{mdc_id}
  record_not_found: "Нет такой записи."
  unknown_command: "Нет такой команды."
  delete_confirm: "Вы действительно хотите удалить этот курс лекарства?"
  delete_success: "Курс лекарства успешно удален."
  delete_cancelled: "Удаление курса лекарства отменено."
