account:
  settings: |
    Управление аккаунтом:

    • «Удалить аккаунт» — скрывает данные на {user_retention_days} дней, после чего их можно восстановить через /start.
    • «Удалить все данные навсегда» — безвозвратное удаление профилей, приступов и аккаунта.
  soft_delete_confirm: |
    Аккаунт будет скрыт на {days} дней. Профили будут помечены удалёнными, записи о приступах сохранятся. Вы сможете восстановить аккаунт через /start.

    Продолжить?
  soft_delete_success: |
    Аккаунт удалён. Данные сохранены {days} дней. Для восстановления нажмите /start.
  soft_delete_failed: "Не удалось удалить аккаунт."
  purge_confirm: |
    Это действие необратимо: все профили, приступы и данные аккаунта будут удалены без возможности восстановления.

    Отправьте сообщение «{phrase}» для подтверждения.
  purge_prompt: "Отправьте сообщение «{phrase}» для подтверждения."
  purge_phrase: "УДАЛИТЬ НАВСЕГДА"
  purge_mismatch: "Подтверждение не совпало. Операция отменена."
  purge_success: "Все данные аккаунта безвозвратно удалены."
  purge_failed: "Не удалось удалить данные аккаунта."
  restore_list_empty: |
    Нет профилей для восстановления. Удалённые профили доступны {days} дней после удаления.
  restore_list_prompt: "Выберите профиль для восстановления:"
  restore_profile_success: "Профиль «{profile_name}» восстановлен."
  restore_profile_failed: "Не удалось восстановить профиль. Возможно, истёк срок хранения."
  purge_profile_success: "Профиль и все связанные данные удалены навсегда."
  purge_profile_failed: "Не удалось удалить профиль."
  restore_codeword_prompt: |
    Введите новое ключевое слово для восстановления аккаунта (от 8 до 25 символов):
  restore_codeword_invalid: "Ключевое слово должно быть от 8 до 25 символов."
  restore_success: "Аккаунт восстановлен. Восстановлено профилей: {profiles_restored}."
  restore_failed: "Не удалось восстановить аккаунт. Возможно, истёк срок хранения."
