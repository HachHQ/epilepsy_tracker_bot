profile:
  need_registration: |
    Необходимо зарегистрироваться, чтобы создать профиль.
    Нажмите на кнопку 'Меню' слева от строки ввода и выберите команду - /start
  info_about_profile: |
    Вы можете создать профиль для себя, родственника, или своего питомца. Заполните анкету его специфичными данными, именем (или кличкой), видом эпилепсии, принимаемыми препаратами и так далее.

    <u>Имя может содержать только заглавные и прописные буквы русского и английского алфавитов и быть от 1 до 40 символов в длину.</u>
  enter_profile_name: "Введите имя профиля:"
  incorrect_profile_name: "Имя может содержать только загланые и прописные буквы русского и английского алфавитов и быть от 1 до 40 символов в длину."
  enter_type_of_epilepsy: "Выберите тип эпилепсии:"
  enter_drugs_info: |
    Тут вы можете перечислить все лекастра, которые принимает тот для кого составляется анкета. Напишите их названия через запятую. Например: паглюферал, леветирацетам, пексион.

    <u>Список может содержать только буквы русского и английского алфавитов, цифры от 0 до 9 и символы , . и пробел.
    Список не может начинаться и заканчиваться на запятую и точку и не может быть длиннее 120 символов.</u>
  enter_drugs: "Введите принимаемые препараты:"
  incorrect_drugs: |
    <u>Список может содержать только буквы русского и английского алфавитов, цифры от 0 до 9 и символы , . и пробел.
    Список не может начинаться и заканчиваться на запятую и точку и не может быть длиннее 120 символов.</u>
  enter_age: "Введите возраст:"
  incorrect_age: |
    <u>Возраст может содержать только число от 1 до 130 включительно.</u>
  enter_sex: "Выберите пол:"
  delete_confirm: |
    Вы действительно хотите удалить профиль?

    Профиль и данные о лекарствах будут скрыты. Записи о приступах сохранятся {days} дней для возможного восстановления.
  delete_success: |
    Профиль удалён. Сохранено записей о приступах: {seizures_preserved}.
    Они будут доступны для восстановления {days} дней.
  delete_not_found: "Нет такой записи."
  delete_cancelled: "Удаление профиля отменено."
  delete_forbidden: "Вы не можете удалить профиль, который не пренадлежит вам."
  ask_human_profile: "Вы создаете профиль для человека?"
  ask_diagnosis: "У вас есть подтвержденный диагноз?"
  ask_animal_species: "Для какого животного вы создаете профиль?"
  invalid_animal_species: "Вид животного не может быть длиннее 30 симовлов."
  enter_diagnosis: "Введите точную формулировку диагноза:"
  diagnosis_updated: "Диагноз обновлен: {value}"
  invalid_diagnosis_length: "Длина диагноза не может быть больше 40 симолов"
  age_updated: "Возраст обновлен: {value}"
  sex_updated_male: "Пол обновлен: Мужской"
  sex_updated_female: "Пол обновлен: Женский"
  form_completed: "Анкета профиля заполнена!"
  form_confirm_prompt: "Нажмите 'Подтвердить', чтобы сохранить введенные данные или 'Отменить', чтобы ввести данные снова."
  restart_registration: "Начните регистрацию заново"
  user_not_found: "Ошибка, пользователь не найден"
  created: "Профиль - {name} создан!"
  choose_profile: "Выберите профиль."
  record_not_found: "Нет такой записи."
  human_profile_only: "Этот профиль создан для человека."
  unknown_command: "Нет такой команды."
  undefined_epilepsy: "Неопределенного типа"
  not_entered: "Не введено"
  sex_male_label: "Мужской"
  sex_female_label: "Женский"
  summary: |
    <u>Имя профиля</u>: <b>{profile_name}</b>
    <u>Вид диагностированной эпилепсии</u>: <b>{epilepsy_type}</b>
    <u>Возраст</u>: <b>{age} лет</b>
    <u>Пол</u>: <b>{sex}</b>
    {animal_line}
  edit_view: |
    Профиль {name}

    Был создан: {created_at}
    Вид диагностированной эпилепсии: {epilepsy_type} - /prof_eptype
    Возраст: {age} - /prof_age
    Пол: {sex} - /prof_sex
    {animal_line}Удалить профиль: - /prof_del
  animal_line: "Животное: {species} - /prof_biospec\n"
  enter_animal_species: "Введите вид животного:"
