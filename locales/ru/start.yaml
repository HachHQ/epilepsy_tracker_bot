start:
  welcome: |
    Привет! Я бот, который поможет тебе удобно и быстро фиксировать данные об эпилептических приступах.

    <b>Доступные возможности:</b>
    - Заполнение/редактирование данных о приступах.
    - Легко делиться зафиксированными данными с доверенными лицами (ДЛ в меню).
    - Импортировать данные из exel таблицы или текстового файла.
    - Настроить регулярные уведомления о приеме лекарств.
    - Просмотр подробной статистики по зафиксированным приступам.

    <u>Нажмите на кнопку для регистрации в боте.</u>
  to_register: "К регистрации"
  policy: |
    📄 Политика хранения и обработки данных
    Данный Telegram-бот является учебным проектом, созданным в рамках защиты выпускной квалификационной работы бакалавра. Он предназначен исключительно для демонстрации функциональности учёта приступов и лекарственной терапии, и не предназначен для использования в реальной медицинской практике.

    💡 Что нужно знать:
     - Вся вводимая информация (например, сведения о приступах и лекарствах) сохраняется локально и обрабатывается только в рамках работы бота.
     - Проект не передаёт данные третьим лицам и не использует их в коммерческих целях.
     - Пользователь вводит данные добровольно и осознаёт, что бот является демонстрационной разработкой.
     - Проект не несёт ответственности за возможное использование данных вне учебных целей.
    🔐 Безопасность:
     - Все данные хранятся на локальном сервере/устройстве разработчика.
     - Проект не подключён к публичной сети и не обрабатывает реальные персональные данные пользователей без их согласия.

    Нажимая на кнопку 'К регистрации' вы подтверждаете, что ознакомилены и согласны с вышеописанными данными.
  already_registered: "Вы уже зарегистрированы. Используйте /menu для работы с ботом."
  deleted_account: |
    Ваш аккаунт был удалён. Данные сохранены до {retention_until}.
    Вы можете восстановить аккаунт в течение {days} дней.
  help: |
    У бота есть три основные команды:
     - /menu: присылает основное меню, через которое ведется всё взаимодействие с ботом.
     - /start: присылает привественное сообщение с руководством полльзователя.
     - /help: присылает инструкцию по пользованию ботом.
