sos:
  notify_template: |
    ⚠️ Внимание: пользователь {tg_name} сообщил о приступе эпилепсии.
    Его юзернейм в телеграмме - {username}
    📌 Расположение: {location}

    🔽 Рекомендуемые действия:
     - Свяжитесь с ним/ней, если это возможно.
     - Убедитесь, что он/она находится в безопасном положении (на боку, подложить что-то мягкое под голову).
     - Не удерживайте человека, не кладите предметы в рот.
     - Если приступ длится дольше 5 минут — вызывайте скорую: 103.

    🧠 Дополнительно: после приступа человек может быть дезориентирован. Оставайтесь с ним/ней, пока состояние не улучшится.
  ask_prompt: "Нажмите на кнопку 'Отправить уведомления', чтобы разослать предупреждение об ухудшении вашего состояния доверенным лицам."
  no_trusted_persons: "У вас нет доверенных лиц, которым вы разрешили получать уведомления."
  sent_header: "Доверенным лицам высланы уведомления:"

