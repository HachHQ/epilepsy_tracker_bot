user:
  enter_username: "Введите свое имя:"
  enter_login: "Придумайте логин, он должен быть уникальным:"
  incorrect_login: "Логин должен иметь длину от 6 до 25 символов, использовать буквы русского или английского алфавита, но допускаются сиволы - '.' '_' '-'"
  user_exist: "Вы уже зарегистрированы."
  login_exist: "Пользователь с логином уже существует, попробуйте ввести другой."
  offer_to_create_profile: |
    Хотите ли вы создать свой личный профиль?
    Для этого потребуется ввести данные о виде эпилепсии, лечении и еще кое о чём.

    Ботом можно пользоваться и без профиля, но тогда вы сможете только следить за состоянием тех людей, котороые добавлены в ваш список доверенных лиц.
    А с личным профилем вы сможете заполнять собственный журнал.
  registration_complete: |
    Анкета заполнена!
    Имя: <b>{name}</b>
    Логин: <b>{login}</b>

    Если хотите изменить данные, отправьте команду /start, чтобы заполнить анкету заново.
  account_deleted_restore_hint: |
    Аккаунт с этим Telegram был удалён, но ещё можно восстановить.
    Нажмите /start и выберите «Восстановить аккаунт».
  timezone_info: |
    Зная ваш часовой пояс бот сможет корректно обрабатывать время приступа и вовремя присылать вам уведомления о приеме лекарств\.

    Введите его в UTC формате\\, например\\:
     \+7 \(для Новосибирска\) или \+3 \(для Москвы\)

    Чтобы узнать часовой пояс в вашем городе нажмите на это сообщение \\-\\> [Ссылка на сайт с часовыми поясами](https://time-in.ru/time/russia)

    Вы так же можете воспользоваться автоматическим определением часового пояса\\, нажав на кнопку под строкой ввода\\, внизу\.

    Бот не хранит важе местоположение\\, только часовой пояс\\.
  enter_timezone: "Выберите ваш часовой пояс или нажмите на кнопку снизу:"
  codeword_prompt: |
    Ввведите ключевое слово, с помощью которого, в дальшейшем мы сможем идентифицировать вас, в случае если вы потеряете доступ к телефону/телеграмму.

    Ключевое слово может быть любым, содержать любые буквы/цифры/знаки. Иметь длину от 8 до 25 символов.

    Запомните его или запишите!
  codeword_invalid: |
    Ключевое слово может быть любым, содержать любые буквы/цифры/знаки. Иметь длину от 8 до 25 символов.

    Запомните его или запишите!
  name_saved: "Имя сохранено."
  invalid_name: "Имя должно иметь длину от 1 до 20 символов, и использовать только буквы русского или английского алфавита"
  timezone_detected: "Часовой пояс определен: {timezone}"
  timezone_not_found: "Часовой пояс не найден, воспользуйтесь клавиатурой или вводом."
  invalid_timezone: "Часовой пояс должен иметь формат - +7 или +3"
