name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diplomathesis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d diplomathesis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      API_TOKEN: ci-test-token
      HMAC_SECRET_KEY: ci-test-secret
      ADMINS: "1"
      DB_NAME: diplomathesis
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/diplomathesis

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system libraries for matplotlib
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfreetype6 libpng16-16

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Alembic single head
        run: pytest tests/test_alembic_heads.py -q

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -q

      - name: Ruff (tests and scripts)
        run: ruff check tests scripts

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bot image
        run: docker build -t diplomathesis-bot:ci .
